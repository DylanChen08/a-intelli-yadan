<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考勤监控 - 管理后台</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1117; color: #e1e4e8; min-height: 100vh;
  }
  .card {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px;
    padding: 32px; width: 420px; max-width: 90vw;
  }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .sub { color: #8b949e; font-size: 13px; margin-bottom: 24px; }
  .row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid #21262d;
  }
  .row:last-child { border-bottom: none; }
  .label { font-size: 15px; color: #c9d1d9; }

  /* Toggle */
  .toggle { position: relative; display: inline-block; width: 52px; height: 28px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
    background: #30363d; border-radius: 28px; transition: .3s;
  }
  .slider::before {
    content: ""; position: absolute; height: 22px; width: 22px;
    left: 3px; bottom: 3px; background: #c9d1d9; border-radius: 50%; transition: .3s;
  }
  input:checked + .slider { background: #238636; }
  input:checked + .slider::before { transform: translateX(24px); }
  .toggle-watch input:checked + .slider { background: #d29922; }

  .interval-input {
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    color: #e1e4e8; padding: 6px 10px; width: 70px; font-size: 14px; text-align: center;
  }
  .interval-input:focus { outline: none; border-color: #58a6ff; }
  .unit { color: #8b949e; margin-left: 4px; font-size: 13px; }

  .status-bar {
    margin-top: 20px; padding: 12px; border-radius: 8px;
    background: #0d1117; border: 1px solid #21262d; font-size: 13px;
  }
  .status-bar p { margin: 4px 0; }
  .refresh-note { color: #484f58; font-size: 11px; margin-top: 16px; text-align: center; }

  /* ===== 月度打卡表格 ===== */
  .monthly-card {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px;
    padding: 24px 20px; width: 960px; max-width: 95vw; margin-top: 24px;
  }
  .monthly-card h2 { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
  .monthly-meta { color: #8b949e; font-size: 12px; margin-bottom: 16px; }
  .monthly-table-wrap { max-height: 600px; overflow-y: auto; border: 1px solid #21262d; border-radius: 8px; }
  .monthly-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .monthly-table th {
    position: sticky; top: 0; z-index: 2;
    background: #1c2128; color: #8b949e; font-weight: 600;
    text-align: left; padding: 8px 10px; border-bottom: 1px solid #30363d;
  }
  .monthly-table td {
    padding: 6px 10px; border-bottom: 1px solid #21262d;
    vertical-align: middle; color: #c9d1d9;
  }
  .monthly-table tbody tr:hover { background: #1c2128; }
  .monthly-table .dir-out { color: #f0883e; font-weight: 600; }
  .monthly-table .dir-in  { color: #3fb950; font-weight: 600; }
  .monthly-table .status-bad { color: #f85149; }

  .photo-thumb {
    width: 56px; height: 56px; object-fit: cover; border-radius: 6px;
    border: 1px solid #30363d; cursor: pointer; transition: transform .15s, border-color .15s;
    background: #0d1117;
  }
  .photo-thumb:hover { transform: scale(1.08); border-color: #58a6ff; }
  .photo-thumb-placeholder {
    display: inline-flex; align-items: center; justify-content: center;
    width: 56px; height: 56px; border-radius: 6px;
    background: #0d1117; border: 1px solid #30363d;
    color: #484f58; font-size: 11px;
  }

  /* ===== 图片放大弹窗 Modal ===== */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 10000;
    background: rgba(0,0,0,.88);
    align-items: center; justify-content: center;
    cursor: pointer;
  }
  .modal-overlay.show { display: flex; }
  .modal-overlay img {
    max-width: 90vw; max-height: 90vh; border-radius: 12px;
    cursor: default; box-shadow: 0 8px 40px rgba(0,0,0,.6);
  }
  .modal-close {
    position: fixed; top: 20px; right: 28px; z-index: 10001;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,.12); border: none;
    color: #fff; font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .modal-close:hover { background: rgba(255,255,255,.22); }

  .empty-hint { text-align: center; color: #484f58; padding: 40px 0; font-size: 14px; }
  .loading-hint { text-align: center; color: #8b949e; padding: 20px 0; font-size: 13px; }


  .leave-alert {
    display: none;
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(135deg, #ff6b35 0%, #f7c59f 50%, #ff6b35 100%);
    background-size: 400% 400%;
    animation: gradientShift 2s ease infinite;
    flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .leave-alert.show { display: flex; }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .alert-emoji { font-size: 96px; animation: bounce 0.8s infinite alternate; }
  @keyframes bounce {
    from { transform: translateY(-10px); }
    to { transform: translateY(10px); }
  }
  .alert-title {
    font-size: clamp(36px, 8vw, 72px); font-weight: 900;
    color: #fff; text-shadow: 0 4px 20px rgba(0,0,0,.4);
    margin: 16px 0 8px; text-align: center; letter-spacing: 2px;
  }
  .alert-time {
    font-size: clamp(24px, 5vw, 48px); color: rgba(255,255,255,.9);
    font-weight: 700; text-align: center;
  }
  .alert-hint { margin-top: 32px; font-size: 14px; color: rgba(255,255,255,.6); }
</style>
</head>
<body>
<div class="leave-alert" id="leaveAlert" onclick="dismissAlert()">
  <div class="alert-emoji">🎉</div>
  <div class="alert-title">雅丹下班了！</div>
  <div class="alert-time" id="alertTime"></div>
  <div class="alert-hint">点击任意位置关闭</div>
</div>

<!-- 图片放大弹窗 -->
<div class="modal-overlay" id="photoModal" onclick="closeModal()">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <img id="modalImg" src="" alt="抓拍照片" onclick="event.stopPropagation()">
</div>

<div style="display:flex;flex-direction:column;align-items:center;padding:24px 0;">

<div class="card">
  <h1>🔍 考勤监控</h1>
  <div class="sub">yadan-report 管理后台</div>

  <div class="row">
    <span class="label">⚡ 强制推送</span>
    <label class="toggle">
      <input type="checkbox" id="forceToggle" onchange="toggleForce(this.checked)">
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">
    <span class="label">⏱️ 推送间隔</span>
    <div>
      <input type="number" class="interval-input" id="intervalInput" value="20" min="5" max="3600" onchange="setIntervalSec(this.value)">
      <span class="unit">秒</span>
    </div>
  </div>

  <div class="row">
    <span class="label">👀 下班监听</span>
    <label class="toggle toggle-watch">
      <input type="checkbox" id="watchToggle" onchange="toggleWatch(this.checked)">
      <span class="slider"></span>
    </label>
  </div>

  <div class="status-bar">
    <p style="font-size:15px;font-weight:600;letter-spacing:1px;color:#c9d1d9;margin-bottom:6px;">🕐 <span id="clock">--</span></p>
    <p>📡 上次运行: <span id="lastRun">-</span></p>
    <p>📊 上次推送: <span id="lastPush">-</span></p>
    <p>🥚 鸭蛋状态: <span id="yadanStatus">-</span></p>
    <p>🟢 服务: <span id="svcStatus">运行中</span></p>
  </div>

  <div class="refresh-note">状态每 5 秒自动刷新</div>
</div>

<!-- 月度打卡记录 -->
<div class="monthly-card" id="monthlyCard">
  <h2>📆 吴雅丹 近一个月打卡记录</h2>
  <div class="monthly-meta" id="monthlyMeta">加载中...</div>
  <div class="monthly-table-wrap">
    <table class="monthly-table" id="monthlyTable">
      <thead>
        <tr>
          <th>日期</th>
          <th>时间</th>
          <th>方向</th>
          <th>门</th>
          <th>状态</th>
          <th>抓拍照片</th>
        </tr>
      </thead>
      <tbody id="monthlyBody">
        <tr><td colspan="6" class="loading-hint">⏳ 加载中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

</div>

<script>
var $ = function(id) { return document.getElementById(id); };

var watchMode = false;
var lastAlertedTime = null;

function updateClock() {
  var n = new Date();
  $('clock').textContent =
    n.getFullYear() + '年'
    + String(n.getMonth() + 1).padStart(2, '0') + '月'
    + String(n.getDate()).padStart(2, '0') + '日 '
    + String(n.getHours()).padStart(2, '0') + ':'
    + String(n.getMinutes()).padStart(2, '0') + ':'
    + String(n.getSeconds()).padStart(2, '0');
}
updateClock();
setInterval(updateClock, 1000);

function fetchStatus() {
  fetch('/api/status')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      $('forceToggle').checked = d.forceMode;
      $('intervalInput').value = d.forceIntervalSeconds;
      $('lastRun').textContent = d.lastRunTime
        ? new Date(d.lastRunTime).toLocaleTimeString('zh-CN')
        : '待执行';
      $('lastPush').textContent = d.lastPushed ? '✅ 已推送' : '⏭️ 无推送';
      $('svcStatus').textContent = d.running ? '运行中' : '已停止';

      var ys = $('yadanStatus');
      if (d.yadanLeaveTime) {
        ys.textContent = '🚪 鸭蛋已下班 ' + d.yadanLeaveTime.substring(0, 5);
        ys.style.color = '#3fb950';
        if (watchMode && d.yadanLeaveTime !== lastAlertedTime) {
          lastAlertedTime = d.yadanLeaveTime;
          $('alertTime').textContent = '下班时间 ' + d.yadanLeaveTime.substring(0, 5);
          $('leaveAlert').classList.add('show');
        }
      } else {
        ys.textContent = '🕐 鸭蛋上班中';
        ys.style.color = '#8b949e';
      }
    })
    .catch(function() {});
}
fetchStatus();
setInterval(fetchStatus, 5000);

function toggleForce(on) {
  fetch('/api/toggle', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ forceMode: on })
  }).then(function() { fetchStatus(); });
}

function setIntervalSec(val) {
  var sec = Math.max(5, Math.min(3600, parseInt(val) || 20));
  fetch('/api/interval', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ seconds: sec })
  }).then(function() { fetchStatus(); });
}

function toggleWatch(on) {
  watchMode = on;
  if (!on) { lastAlertedTime = null; $('leaveAlert').classList.remove('show'); }
}

function dismissAlert() {
  $('leaveAlert').classList.remove('show');
}

// ===== 月度打卡数据 =====
function fetchMonthly() {
  fetch('/api/monthly')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      // 替换空格为T兼容Safari日期解析，倒序排列
      var records = (d.records || []).sort(function(a, b) {
        return new Date(b.identifyTime.replace(' ', 'T')) - new Date(a.identifyTime.replace(' ', 'T'));
      });
      var body = $('monthlyBody');
      var meta = $('monthlyMeta');

      if (records.length === 0) {
        meta.textContent = '暂无数据（等待首次查询）';
        body.innerHTML = '<tr><td colspan="6" class="empty-hint">暂无打卡记录</td></tr>';
        return;
      }

      meta.textContent = '共 ' + records.length + ' 条，最近在前';
      var html = '';
      for (var i = 0; i < records.length; i++) {
        var r = records[i];
        var dt = (r.identifyTime || '-').split(' ');
        var date = dt[0] ? dt[0].substring(5) : '-';
        var time = dt[1] || '-';
        var deviceName = r.deviceName || '未知';
        var dirClass = deviceName.indexOf('出') !== -1 ? 'dir-out' : 'dir-in';
        var dirText = deviceName.indexOf('出') !== -1 ? '出门' : '进门';
        var statusHtml = r.passStatus === '1' ? '正常' : '<span class="status-bad">⚠️ 异常</span>';

        var photoCell;
        if (r.photoUrl) {
          photoCell = '<img class="photo-thumb" src="' + escapeHtml(r.photoUrl)
            + '" onclick="openPhoto(\'' + escapeJs(r.photoUrl) + '\');event.stopPropagation()"'
            + ' loading="lazy" onerror="this.outerHTML=\'<div class=photo-thumb-placeholder><div>不可用</div></div>\'">';
        } else {
          photoCell = '<div class="photo-thumb-placeholder">无照片</div>';
        }

        html += '<tr>'
          + '<td>' + date + '</td>'
          + '<td>' + time + '</td>'
          + '<td class="' + dirClass + '">' + dirText + '</td>'
          + '<td>' + deviceName + '</td>'
          + '<td>' + statusHtml + '</td>'
          + '<td>' + photoCell + '</td>'
          + '</tr>';
      }
      body.innerHTML = html;
    })
    .catch(function() {
      $('monthlyBody').innerHTML = '<tr><td colspan="6" class="empty-hint">加载失败</td></tr>';
    });
}

function openPhoto(url) {
  $('modalImg').src = url;
  $('photoModal').classList.add('show');
}

function closeModal() {
  $('photoModal').classList.remove('show');
  $('modalImg').src = '';
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function escapeJs(str) {
  return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

fetchMonthly();
setInterval(fetchMonthly, 60000); // 每分钟刷新月度数据

</script>
</body>
</html>
